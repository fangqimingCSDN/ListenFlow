<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>实时语音转写</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600&family=Noto+Sans+SC:wght@300;400;500;700&display=swap');
    :root {
      --bg:      #0d1117; --surface: #161b22; --border: #30363d;
      --accent:  #58a6ff; --green:   #3fb950; --red:    #f85149;
      --yellow:  #d29922; --text:    #e6edf3; --muted:  #8b949e;
      --radius:  10px;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Noto Sans SC', sans-serif;
      background: var(--bg); color: var(--text);
      min-height: 100vh; display: flex; flex-direction: column;
    }
    header {
      display: flex; align-items: center; justify-content: space-between;
      padding: 14px 28px; border-bottom: 1px solid var(--border);
      background: var(--surface);
    }
    header h1 { font-size: 1.1rem; font-weight: 500; letter-spacing: .04em; }
    header h1 span { color: var(--accent); font-family: 'JetBrains Mono', monospace; }
    #statusBadge {
      font-size: .75rem; padding: 3px 12px; border-radius: 20px;
      background: #21262d; border: 1px solid var(--border);
      color: var(--muted); font-family: 'JetBrains Mono', monospace; transition: all .3s;
    }
    #statusBadge.recording { border-color: var(--red);    color: var(--red);    animation: pulse 1.5s infinite; }
    #statusBadge.paused    { border-color: var(--yellow); color: var(--yellow); }
    #statusBadge.done      { border-color: var(--green);  color: var(--green);  }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.4} }

    .container {
      display: grid; grid-template-columns: 1fr 320px;
      gap: 20px; flex: 1; padding: 20px 28px;
      max-width: 1400px; width: 100%; margin: 0 auto;
    }
    .controls {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: var(--radius); padding: 20px;
      display: flex; flex-direction: column; gap: 14px; align-self: start;
    }
    .controls h2 { font-size: .78rem; color: var(--muted); letter-spacing: .1em; text-transform: uppercase; }
    .btn {
      display: flex; align-items: center; justify-content: center; gap: 8px;
      padding: 10px 0; border-radius: 8px; font-size: .9rem; font-weight: 500;
      cursor: pointer; border: none; width: 100%;
      transition: opacity .2s, transform .1s;
      font-family: 'Noto Sans SC', sans-serif;
    }
    .btn:active { transform: scale(.97); }
    .btn:disabled { opacity: .35; cursor: not-allowed; }
    .btn-record { background: var(--red);    color: #fff; }
    .btn-pause  { background: var(--yellow); color: #000; }
    .btn-stop   { background: #30363d;       color: var(--text); }
    .info-row {
      display: flex; justify-content: space-between;
      font-size: .8rem; color: var(--muted);
      padding: 5px 0; border-bottom: 1px solid var(--border);
    }
    .info-row span:last-child { color: var(--text); font-family: 'JetBrains Mono', monospace; }
    .spk-editor { display: flex; flex-direction: column; gap: 8px; }
    .spk-row { display: flex; align-items: center; gap: 8px; }
    .spk-label {
      font-family: 'JetBrains Mono', monospace; font-size: .72rem;
      padding: 3px 8px; border-radius: 4px; min-width: 82px;
      color: #fff; flex-shrink: 0; text-align: center;
    }
    .spk-input {
      flex: 1; background: var(--bg); border: 1px solid var(--border);
      border-radius: 6px; padding: 5px 9px; color: var(--text);
      font-size: .85rem; font-family: 'Noto Sans SC', sans-serif;
    }
    .spk-input:focus { outline: none; border-color: var(--accent); }
    .btn-save-spk {
      padding: 8px 0; border-radius: 7px; background: var(--green);
      color: #000; border: none; font-size: .85rem; font-weight: 600;
      cursor: pointer; width: 100%; font-family: 'Noto Sans SC', sans-serif;
    }
    .btn-save-spk:hover { opacity: .85; }
    .transcript-wrap { display: flex; flex-direction: column; gap: 12px; }
    .transcript-header { display: flex; align-items: center; justify-content: space-between; }
    .transcript-header h2 { font-size: .95rem; font-weight: 500; }
    .btn-clear {
      font-size: .75rem; color: var(--muted); background: none;
      border: 1px solid var(--border); border-radius: 6px;
      padding: 4px 10px; cursor: pointer;
    }
    .btn-clear:hover { border-color: var(--red); color: var(--red); }
    #transcriptBox {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: var(--radius); padding: 16px 18px;
      min-height: 440px; max-height: 620px; overflow-y: auto;
      display: flex; flex-direction: column; gap: 14px;
      scroll-behavior: smooth;
    }
    #transcriptBox:empty::before {
      content: '等待语音输入...';
      color: var(--muted); font-size: .9rem;
      margin: auto; display: block; text-align: center; padding: 60px 0;
    }
    .seg { display: flex; flex-direction: column; gap: 4px; animation: fadeUp .3s ease; }
    @keyframes fadeUp { from{opacity:0;transform:translateY(6px)} to{opacity:1;transform:none} }
    .seg-meta { display: flex; align-items: center; gap: 8px; }
    .seg-spk {
      font-family: 'JetBrains Mono', monospace; font-size: .7rem;
      padding: 2px 8px; border-radius: 4px; color: #fff; font-weight: 600;
    }
    .seg-time { font-size: .7rem; color: var(--muted); font-family: 'JetBrains Mono', monospace; }
    .seg-text {
      font-size: .93rem; line-height: 1.7; padding: 8px 12px;
      border-radius: 0 8px 8px 8px; background: #21262d;
      border-left: 3px solid transparent;
    }
    #waveCanvas {
      width: 100%; height: 56px; border-radius: 8px;
      background: var(--surface); border: 1px solid var(--border); display: block;
    }
    #dlSection { display: none; flex-direction: column; gap: 8px; }
    #dlSection.visible { display: flex; }
    .dl-link {
      display: flex; align-items: center; gap: 8px;
      padding: 9px 12px; border-radius: 8px; background: #21262d;
      border: 1px solid var(--border); color: var(--accent);
      text-decoration: none; font-size: .85rem; transition: border-color .2s;
    }
    .dl-link:hover { border-color: var(--accent); }
    ::-webkit-scrollbar { width: 5px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
  </style>
</head>
<body>

<header>
  <h1>&#127908; <span>SpeechLive</span>&nbsp; 实时语音转写</h1>
  <span id="statusBadge">未连接</span>
</header>

<div class="container">

  <!-- 转写区 -->
  <div class="transcript-wrap">
    <div class="transcript-header">
      <h2>转写结果</h2>
      <button class="btn-clear" onclick="clearTranscript()">清空</button>
    </div>
    <canvas id="waveCanvas"></canvas>
    <div id="transcriptBox"></div>
  </div>

  <!-- 右侧面板 -->
  <div>
    <!-- 录音控制 -->
    <div class="controls">
      <h2>控制</h2>
      <button class="btn btn-record" id="btnRecord" onclick="startRecording()">&#9679; 开始录音</button>
      <button class="btn btn-pause"  id="btnPause"  onclick="togglePause()" disabled>&#9646;&#9646; 暂停</button>
      <button class="btn btn-stop"   id="btnStop"   onclick="stopRecording()" disabled>&#9632; 停止</button>
      <div class="info-row"><span>会话 ID</span><span id="infoSid">—</span></div>
      <div class="info-row"><span>片段数</span><span id="infoSegs">0</span></div>
      <div class="info-row"><span>说话人</span><span id="infoSpks">0</span></div>
      <div class="info-row"><span>时长</span><span id="infoDur">0s</span></div>
    </div>

    <!-- 说话人姓名编辑 -->
    <div class="controls" style="margin-top:16px">
      <h2>说话人姓名</h2>
      <div class="spk-editor" id="spkEditor">
        <span style="font-size:.8rem;color:var(--muted)">识别到说话人后显示</span>
      </div>
      <button class="btn-save-spk" onclick="saveSpeakerNames()">&#10003; 保存姓名</button>
    </div>

    <!-- 下载 -->
    <div class="controls" style="margin-top:16px">
      <h2>下载</h2>
      <div id="dlSection">
        <a class="dl-link" id="dlAudio" href="#" target="_blank">&#127911; 下载录音 (WAV)</a>
        <a class="dl-link" id="dlText"  href="#" target="_blank">&#128196; 下载转写文本</a>
      </div>
      <span id="dlPending" style="font-size:.8rem;color:var(--muted)">会话完成后生成链接</span>
    </div>
  </div>
</div>

<script src="app.js"></script>
</body>
</html>
